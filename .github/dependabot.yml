# Dependabot configuration — Paideia
#
# Authored at S-0133 per engine/adr/0069-dependabot-pip-and-actions-ecosystems.md
# (Issue #67). Closes SWE-hardening Tier 1.
#
# Two ecosystems:
#   - pip                — reads pyproject.toml [project.dependencies] at repo
#                          root per ADR 0064 (uv lockfile contract). Bumps
#                          floors; reviewer (or future auto-rebase action)
#                          regenerates uv.lock per the lockfile-regen
#                          reminder in .github/PULL_REQUEST_TEMPLATE.md.
#                          engine/tools/requirements.txt is the deprecated
#                          one-line redirect pointer (S-0127) — not scanned;
#                          Dependabot only reads the repo-root pyproject.toml.
#   - github-actions     — reads .github/workflows/validate.yml. Bumps action
#                          version pins; the validate.yml workflow is the
#                          single CI workflow per ADR 0065 (engine).
#
# Posture decisions per ADR 0069:
#   - Weekly cadence on Mondays — Dependabot default; aligns batch review
#     with start-of-week.
#   - Grouped minor/patch updates per ecosystem — single PR per ecosystem
#     per week instead of one PR per dep. Major-version bumps remain
#     separate (compatibility / contract-change judgment required).
#   - Max 10 open PRs per ecosystem — ECC baseline; tune from observation.
#   - Auto-rebase on conflict — reduces stale-PR friction. Dependabot
#     default; named explicitly for readability.
#   - Conventional Commits via `commit-message.prefix: chore` +
#     `include: scope` → "chore(deps): bump X from A to B".
#   - Dependabot PRs are merged via human review (NOT auto-merged) per the
#     ADR 0069 posture rule. CI green (validate.yml + bandit + uv lock --check)
#     is necessary but not sufficient.
#
# Refresh: see engine/operations/dependency-discipline.md.

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      pip-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
